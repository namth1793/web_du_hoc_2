[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# Proxy /api calls to Railway backend
# IMPORTANT: Replace the URL below with your actual Railway URL after deploying backend
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-APP.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
